syntax = "proto3";
package wm;

// entity_id é atribuído exclusivamente pelo Gateway — o cliente nunca envia este campo.
// O Gateway sobrescreve qualquer valor recebido antes de encaminhar ao World Server.
// Campo 2 reservado para não reutilizar.
message PlayerInput {
  uint32 sequence      = 1;
  uint32 entity_id     = 2; // somente uso interno servidor; sobrescrito pelo Gateway
  InputType input_type = 3;
  Vec2 direction       = 4;
  SkillUse skill_use   = 5;
  DodgeInput dodge     = 6;
  // client_tick removido: nunca foi validado server-side e criava vetor de
  // manipulação do lag-compensation. O servidor usa seu próprio Instant.
}

message WorldSnapshot {
  uint32 tick                  = 1;
  uint32 last_processed_input  = 2;
  repeated EntityState entities = 3;
  repeated CombatEvent combat_events = 4;
  uint32 local_entity_id       = 5;
  repeated LevelUpEvent level_up_events = 6;
  repeated LootDrop loot_drops = 7;
  repeated EntityState mob_entities = 8;
  /// Preenchido pelo Gateway quando Mobile/Web precisa revalidar sessão após handoff.
  SessionReAuthChallenge session_reauth_challenge = 9;
  /// Resultado da revalidação via refresh token (Gateway → cliente).
  SessionReAuthResult session_reauth_result = 10;
}

message EntityState {
  uint32 entity_id             = 1;
  Vec2 position                = 2;
  float rotation               = 3;
  uint32 collision_flags       = 4;
  uint32 last_processed_input  = 5;
  int32 hp                     = 6;
  int32 max_hp                 = 7;
  EntityAction current_action  = 8;
}

message Vec2 {
  float x = 1;
  float y = 2;
}

enum InputType {
  MOVE  = 0;
  STOP  = 1;
  SKILL = 2;
  DODGE = 3;
}

message SkillUse {
  uint32 skill_id         = 1;
  uint32 target_entity_id = 2;
}

message DodgeInput {
  Vec2 direction = 1;
}

message DamageEvent {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  int32 damage            = 3;
  int32 remaining_hp      = 4;
}

message DodgeResult {
  uint32 entity_id = 1;
  bool success     = 2;
}

message DeathEvent {
  uint32 entity_id = 1;
  uint32 killer_id = 2;
}

message CombatEvent {
  oneof event {
    DamageEvent damage  = 1;
    DodgeResult dodge   = 2;
    DeathEvent death    = 3;
  }
}

enum EntityAction {
  IDLE    = 0;
  MOVING  = 1;
  CASTING = 2;
  DODGING = 3;
  DEAD    = 4;
}

// Auth
message LoginRequest {
  string username = 1;
  string password = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success          = 1;
  string token          = 2;
  string error_message  = 3;
  CharacterData character = 4;
  string refresh_token  = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  bool success         = 1;
  string token         = 2;
  string refresh_token = 3;
  string error_message = 4;
}

// Persistência / Progressão
message CharacterData {
  int64 character_id   = 1;
  string name          = 2;
  int32 level          = 3;
  int64 experience     = 4;
  int32 hp             = 5;
  int32 max_hp         = 6;
  float position_x     = 7;
  float position_y     = 8;
  string position_map  = 9;
  repeated InventorySlot inventory = 10;
}

message InventorySlot {
  int32 slot      = 1;
  ItemData item   = 2;
}

// Campos tipados evitam dupla serialização (JSON dentro de Protobuf)
message ItemData {
  uint32 item_id   = 1;
  string item_name = 2;
  uint32 quantity  = 3;
}

message LevelUpEvent {
  uint32 entity_id     = 1;
  int32 new_level      = 2;
  int64 new_experience = 3;
}

message LootDrop {
  uint32 entity_id = 1;
  int32 slot       = 2;
  ItemData item    = 3;
}

/// Sent by the client as the FIRST binary packet on the game connection
/// (WebSocket port 8080 or WebTransport port 4433).
/// The gateway validates the JWT and forwards a CharacterAssignment to the world.
message GameAuthPacket {
  string token = 1;
  ClientPlatform client_platform = 2;
}

/// Client-declared platform for session IP policy (PC strict, Mobile/Web handoff).
enum ClientPlatform {
  CLIENT_PLATFORM_UNKNOWN = 0;
  CLIENT_PLATFORM_PC = 1;
  CLIENT_PLATFORM_MOBILE = 2;
  CLIENT_PLATFORM_WEB = 3;
}

/// Sent during an active ReAuthChallenge (Mobile/Web network handoff).
/// Submete o refresh token rotativo para revalidar sessão e re-bind de IP.
message SessionReAuthPacket {
  reserved 1;
  reserved "token";
  string refresh_token = 2;
}

/// Server→client: solicita revalidação de sessão após mudança de IP (Mobile/Web).
/// Entregue via `WorldSnapshot.session_reauth_challenge` (Gateway).
message SessionReAuthChallenge {
  uint32 deadline_secs = 1;
}

/// Server→client: tokens rotacionados após revalidação bem-sucedida.
message SessionReAuthResult {
  bool success         = 1;
  string access_token  = 2;
  string refresh_token = 3;
  string error_message = 4;
}
