services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weapons_masters
      POSTGRES_USER: wm
      POSTGRES_PASSWORD: wm_dev
    ports: ["5432:5432"]
    volumes:
      - "pg_data:/var/lib/postgresql/data"
      - "./migrations:/docker-entrypoint-initdb.d"

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports: ["4222:4222", "8222:8222"]
    volumes: ["nats_data:/data"]

  world-server:
    image: rust:slim
    working_dir: /app/server
    command: bash -c "apt-get update && apt-get install -y protobuf-compiler pkg-config libssl-dev && cargo run -p world"
    volumes:
      - ../:/app
      - cargo_cache:/usr/local/cargo/registry
      - cargo_target:/app/server/target
    ports:
      - "4433:4433/udp" # WebTransport
      - "8080:8080"     # Game WebSocket fallback
      - "8081:8081"     # Auth / WebSocket
    environment:
      - DATABASE_URL=postgres://wm:wm_dev@postgres:5432/weapons_masters
      - REDIS_URL=redis://redis:6379/
      - NATS_URL=nats://nats:4222
      - JWT_SECRET=super_secret_for_dev_only_123456
      - RUST_LOG=info,gateway=debug
    depends_on:
      - postgres
      - redis
      - nats

volumes:
  pg_data:
  nats_data:
  cargo_cache:
  cargo_target:
